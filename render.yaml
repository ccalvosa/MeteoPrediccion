services:
  - type: web
    name: meteo-ensemble-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
    autoDeploy: true
    plan: free  # Subir a 'starter' en producción (GEFS+IFS combinado necesita más RAM)
